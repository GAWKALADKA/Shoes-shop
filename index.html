<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOLÈN — Formal Footwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syncopate:wght@400;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    [data-theme="dark"] {
      --bg:#050507; --surface:#0d0d12; --card:#111118;
      --border:rgba(255,255,255,0.06); --border-strong:rgba(255,255,255,0.12);
      --gold:#c9a84c; --gold-light:#e8c97e;
      --white:#f0ece4; --muted:#6b6872;
      --nav-bg:rgba(5,5,7,0.9); --shadow:rgba(0,0,0,0.6);
      --chat-bg:#16161e;
    }
    [data-theme="light"] {
      --bg:#f7f4ef; --surface:#ede9e1; --card:#ffffff;
      --border:rgba(0,0,0,0.08); --border-strong:rgba(0,0,0,0.15);
      --gold:#a8742a; --gold-light:#c9943c;
      --white:#1a1710; --muted:#7a7268;
      --nav-bg:rgba(247,244,239,0.92); --shadow:rgba(0,0,0,0.15);
      --chat-bg:#f0ece4;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--white);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;transition:background .4s,color .4s;}
    /* CURSOR */
    .cursor{width:10px;height:10px;background:var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;mix-blend-mode:difference;}
    .cursor-ring{width:36px;height:36px;border:1px solid var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transition:transform .15s ease,width .25s,height .25s,opacity .25s;opacity:.5;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.35;}
    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 4rem;border-bottom:1px solid var(--border);background:var(--nav-bg);backdrop-filter:blur(20px);transition:background .4s,border-color .3s;}
    .logo{font-family:'Syncopate',sans-serif;font-size:1.1rem;letter-spacing:.3em;color:var(--gold);text-decoration:none;}
    .logo span{color:var(--white);}
    .nav-links{display:flex;gap:2.5rem;list-style:none;}
    .nav-links a{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;}
    .nav-links a:hover{color:var(--gold);}
    .nav-right{display:flex;align-items:center;gap:.8rem;}
    .theme-toggle{width:44px;height:24px;background:var(--border-strong);border-radius:12px;border:1px solid var(--border-strong);cursor:none;position:relative;transition:background .3s;flex-shrink:0;}
    .theme-toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--gold);transition:transform .3s;}
    [data-theme="light"] .theme-toggle::after{transform:translateX(20px);}
    .theme-icon{font-size:.9rem;}
    .cart-nav-btn{background:transparent;border:1px solid var(--border-strong);color:var(--white);cursor:none;padding:.5rem 1rem;font-family:'Syncopate',sans-serif;font-size:.6rem;letter-spacing:.15em;display:flex;align-items:center;gap:.5rem;transition:border-color .3s,color .3s;}
    .cart-nav-btn:hover{border-color:var(--gold);color:var(--gold);}
    .cart-count{background:var(--gold);color:var(--bg);width:18px;height:18px;border-radius:50%;font-size:.55rem;display:flex;align-items:center;justify-content:center;font-weight:700;}
    .nav-cta{font-family:'Syncopate',sans-serif;font-size:.65rem;letter-spacing:.2em;padding:.6rem 1.4rem;border:1px solid var(--gold);color:var(--gold);background:transparent;cursor:none;transition:background .3s,color .3s;text-decoration:none;}
    .nav-cta:hover{background:var(--gold);color:var(--bg);}
    /* HERO */
    .hero{min-height:100vh;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0 4rem;}
    .hero-video-bg{position:absolute;inset:0;z-index:0;overflow:hidden;}
    .hero-video-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 50%,rgba(201,168,76,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 80% at 20% 30%,rgba(139,115,85,.05) 0%,transparent 60%);animation:videoBg 8s ease-in-out infinite alternate;}
    .hero-video-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--bg) 0%,transparent 50%,var(--bg) 100%);}
    @keyframes videoBg{0%{opacity:.6;transform:scale(1) rotate(0deg);}100%{opacity:1;transform:scale(1.05) rotate(1deg);}}
    .particles{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:floatParticle var(--dur,8s) var(--delay,0s) ease-in-out infinite;}
    @keyframes floatParticle{0%{opacity:0;transform:translateY(100vh) translateX(0);}10%{opacity:.6;}90%{opacity:.3;}100%{opacity:0;transform:translateY(-10vh) translateX(var(--drift,20px));}}
    .hero-bg-line{position:absolute;top:0;right:45%;width:1px;height:100%;background:var(--border);z-index:2;}
    .hero-text{padding-right:4rem;animation:fadeUp 1s ease both;position:relative;z-index:3;}
    .hero-tag{font-family:'Syncopate',sans-serif;font-size:.62rem;letter-spacing:.4em;color:var(--gold);margin-bottom:2rem;display:flex;align-items:center;gap:1rem;}
    .hero-tag::before{content:'';display:block;width:40px;height:1px;background:var(--gold);}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,6vw,5.5rem);font-weight:300;line-height:1.05;margin-bottom:1.5rem;}
    h1 em{font-style:italic;color:var(--gold-light);}
    .hero-desc{font-size:.9rem;line-height:1.8;color:var(--muted);max-width:380px;margin-bottom:3rem;}
    .btn-group{display:flex;gap:1.2rem;align-items:center;}
    .btn-primary{font-family:'Syncopate',sans-serif;font-size:.65rem;letter-spacing:.2em;padding:1rem 2.4rem;background:var(--gold);color:var(--bg);border:none;cursor:none;text-decoration:none;transition:background .3s,transform .3s;display:inline-block;}
    .btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);}
    .btn-ghost{font-size:.75rem;letter-spacing:.15em;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .3s;}
    .btn-ghost:hover{color:var(--white);}
    .btn-ghost::after{content:'→';}
    .hero-visual{position:relative;z-index:3;display:flex;align-items:center;justify-content:center;animation:fadeIn 1.4s ease both;}
    .hero-shoe-card{width:100%;max-width:480px;aspect-ratio:4/3;background:var(--card);border:1px solid var(--border-strong);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .shoe-placeholder{font-size:8rem;opacity:.12;user-select:none;animation:floatShoe 6s ease-in-out infinite;}
    .hero-shoe-label{position:absolute;bottom:1.5rem;left:1.5rem;font-family:'Syncopate',sans-serif;font-size:.55rem;letter-spacing:.3em;color:var(--gold);}
    .hero-shoe-price{position:absolute;bottom:1.5rem;right:1.5rem;font-family:'Cormorant Garamond',serif;font-size:1.4rem;}
    .stats-row{display:flex;gap:3rem;margin-top:4rem;padding-top:3rem;border-top:1px solid var(--border);}
    .stat-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--gold-light);}
    .stat-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
    /* MARQUEE */
    .marquee-section{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:1rem 0;overflow:hidden;background:var(--surface);}
    .marquee-track{display:flex;gap:4rem;width:max-content;animation:marquee 20s linear infinite;}
    .marquee-item{font-family:'Syncopate',sans-serif;font-size:.6rem;letter-spacing:.3em;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:2rem;}
    .marquee-item::after{content:'✦';color:var(--gold);font-size:.5rem;}
    /* FILTER */
    .filter-bar{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:2.5rem;padding:1.5rem 0;border-bottom:1px solid var(--border);}
    .filter-label{font-family:'Syncopate',sans-serif;font-size:.58rem;letter-spacing:.25em;color:var(--muted);}
    .filter-btn{font-size:.72rem;letter-spacing:.1em;padding:.45rem 1.2rem;background:transparent;border:1px solid var(--border-strong);color:var(--muted);cursor:none;transition:all .3s;}
    .filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.05);}
    .size-filter{margin-left:auto;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
    .size-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:.72rem;background:transparent;border:1px solid var(--border-strong);color:var(--muted);cursor:none;transition:all .3s;}
    .size-btn:hover,.size-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06);}
    /* SECTION */
    .section{padding:7rem 4rem;position:relative;}
    .section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;}
    .section-tag{font-family:'Syncopate',sans-serif;font-size:.6rem;letter-spacing:.4em;color:var(--gold);margin-bottom:.8rem;}
    h2{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,4vw,3.8rem);font-weight:300;}
    h2 em{font-style:italic;color:var(--gold-light);}
    .view-all{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:.2rem;transition:color .3s,border-color .3s;}
    .view-all:hover{color:var(--gold);border-color:var(--gold);}
    /* PRODUCTS */
    .product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px;}
    .product-card{background:var(--card);border:1px solid var(--border);overflow:hidden;position:relative;transition:transform .4s cubic-bezier(.25,.46,.45,.94),opacity .4s;cursor:none;}
    .product-card.hidden{opacity:0;pointer-events:none;transform:scale(.95);}
    .product-card:hover{transform:translateY(-6px);z-index:2;}
    .product-card:hover .product-img-wrap::after{opacity:1;}
    .product-card:hover .add-btn{transform:translateY(0);opacity:1;}
    .product-card.featured{grid-column:span 2;}
    .product-img-wrap{aspect-ratio:4/3;background:var(--surface);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .product-card.featured .product-img-wrap{aspect-ratio:16/9;}
    .product-img-wrap::after{content:'';position:absolute;inset:0;background:rgba(201,168,76,.05);opacity:0;transition:opacity .3s;}
    .shoe-icon{font-size:5rem;opacity:.12;user-select:none;transition:transform .5s ease,opacity .3s;}
    .product-card:hover .shoe-icon{transform:scale(1.1) rotate(-5deg);opacity:.18;}
    .product-card.featured .shoe-icon{font-size:8rem;}
    .badge{position:absolute;top:1rem;left:1rem;font-family:'Syncopate',sans-serif;font-size:.5rem;letter-spacing:.2em;padding:.3rem .8rem;background:var(--gold);color:var(--bg);}
    .badge.new{background:transparent;border:1px solid var(--gold);color:var(--gold);}
    .product-info{padding:1.4rem 1.6rem;}
    .product-brand{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
    .product-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;margin-bottom:.3rem;}
    .product-desc{font-size:.78rem;color:var(--muted);line-height:1.6;margin-bottom:1rem;}
    .product-footer{display:flex;align-items:center;justify-content:space-between;}
    .product-price{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--gold-light);}
    .product-price span{font-size:.8rem;color:var(--muted);text-decoration:line-through;margin-right:.4rem;}
    .add-btn{font-family:'Syncopate',sans-serif;font-size:.55rem;letter-spacing:.2em;padding:.6rem 1.2rem;background:var(--gold);color:var(--bg);border:none;cursor:none;transform:translateY(4px);opacity:0;transition:transform .3s,opacity .3s,background .2s;}
    .add-btn:hover{background:var(--gold-light);}
    /* FEATURES */
    .features-strip{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
    .feature-item{padding:3rem 2.5rem;border-right:1px solid var(--border);transition:background .3s;}
    .feature-item:last-child{border-right:none;}
    .feature-item:hover{background:var(--surface);}
    .feature-icon{font-size:1.5rem;margin-bottom:1rem;}
    .feature-title{font-family:'Syncopate',sans-serif;font-size:.62rem;letter-spacing:.2em;color:var(--gold);margin-bottom:.6rem;}
    .feature-desc{font-size:.8rem;color:var(--muted);line-height:1.7;}
    /* HIGHLIGHT */
    .highlight{display:grid;grid-template-columns:1fr 1fr;min-height:70vh;overflow:hidden;}
    .highlight-visual{background:var(--surface);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .highlight-visual::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 60% 40%,rgba(201,168,76,.08),transparent 70%);}
    .highlight-shoe{font-size:14rem;opacity:.1;animation:floatShoe 7s ease-in-out infinite;}
    .highlight-content{padding:6rem 5rem;display:flex;flex-direction:column;justify-content:center;background:var(--card);}
    .highlight-content h2{margin-bottom:1.5rem;}
    .highlight-content p{font-size:.9rem;line-height:1.9;color:var(--muted);max-width:420px;margin-bottom:2.5rem;}
    .highlight-list{list-style:none;margin-bottom:3rem;}
    .highlight-list li{font-size:.82rem;color:var(--muted);padding:.6rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;}
    .highlight-list li::before{content:'—';color:var(--gold);}
    /* TRACKING */
    .tracking-section{padding:7rem 4rem;background:var(--surface);}
    .tracking-box{max-width:700px;margin:0 auto;background:var(--card);border:1px solid var(--border-strong);padding:3rem;}
    .tracking-input-row{display:flex;gap:0;margin-bottom:2.5rem;}
    .tracking-input{flex:1;background:var(--bg);border:1px solid var(--border-strong);border-right:none;padding:.9rem 1.4rem;color:var(--white);font-family:'Jost',sans-serif;font-size:.88rem;outline:none;transition:border-color .3s;}
    .tracking-input:focus{border-color:var(--gold);}
    .tracking-input::placeholder{color:var(--muted);}
    .tracking-btn{font-family:'Syncopate',sans-serif;font-size:.6rem;letter-spacing:.2em;padding:.9rem 1.8rem;background:var(--gold);color:var(--bg);border:none;cursor:none;transition:background .3s;white-space:nowrap;}
    .tracking-btn:hover{background:var(--gold-light);}
    .tracking-steps{display:flex;align-items:flex-start;gap:0;position:relative;}
    .tracking-steps::before{content:'';position:absolute;top:16px;left:0;right:0;height:1px;background:var(--border-strong);z-index:0;}
    .tracking-step{flex:1;text-align:center;position:relative;z-index:1;}
    .step-dot{width:32px;height:32px;border-radius:50%;margin:0 auto .8rem;display:flex;align-items:center;justify-content:center;font-size:.75rem;background:var(--bg);border:2px solid var(--border-strong);transition:all .5s;}
    .tracking-step.done .step-dot{background:var(--gold);border-color:var(--gold);color:var(--bg);}
    .tracking-step.active .step-dot{background:transparent;border-color:var(--gold);color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.4);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4);}50%{box-shadow:0 0 0 8px rgba(201,168,76,0);}}
    .step-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .tracking-step.done .step-label,.tracking-step.active .step-label{color:var(--gold);}
    .tracking-status{margin-top:2rem;padding:1rem 1.5rem;background:rgba(201,168,76,.06);border-left:2px solid var(--gold);font-size:.82rem;color:var(--muted);display:none;}
    .tracking-status.show{display:block;}
    /* TESTIMONIALS */
    .testimonials{padding:7rem 4rem;background:var(--surface);}
    .testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
    .testi-card{background:var(--card);border:1px solid var(--border);padding:2.5rem;position:relative;}
    .testi-card::before{content:'"';font-family:'Cormorant Garamond',serif;font-size:6rem;color:var(--gold);opacity:.15;position:absolute;top:.5rem;right:1.5rem;line-height:1;}
    .testi-stars{color:var(--gold);font-size:.7rem;margin-bottom:1.2rem;letter-spacing:.2em;}
    .testi-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;line-height:1.7;color:var(--white);margin-bottom:2rem;}
    .testi-author{font-size:.72rem;letter-spacing:.15em;color:var(--muted);}
    .testi-author strong{display:block;color:var(--white);margin-bottom:.2rem;font-weight:400;}
    /* NEWSLETTER */
    .newsletter{padding:7rem 4rem;background:var(--bg);text-align:center;border-top:1px solid var(--border);}
    .newsletter .section-tag{margin-bottom:1rem;}
    .newsletter h2{margin-bottom:1.2rem;}
    .newsletter p{font-size:.88rem;color:var(--muted);margin-bottom:2.5rem;}
    .subscribe-form{display:flex;gap:0;max-width:440px;margin:0 auto;border:1px solid var(--border-strong);}
    .subscribe-form input{flex:1;background:transparent;border:none;padding:1rem 1.4rem;color:var(--white);font-family:'Jost',sans-serif;font-size:.85rem;outline:none;}
    .subscribe-form input::placeholder{color:var(--muted);}
    .subscribe-form button{font-family:'Syncopate',sans-serif;font-size:.6rem;letter-spacing:.2em;padding:1rem 1.8rem;background:var(--gold);color:var(--bg);border:none;cursor:none;transition:background .3s;}
    .subscribe-form button:hover{background:var(--gold-light);}
    /* FOOTER */
    footer{background:var(--surface);border-top:1px solid var(--border);padding:5rem 4rem 2rem;}
    .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4rem;margin-bottom:4rem;}
    .footer-brand .logo{display:block;margin-bottom:1.2rem;font-size:1rem;}
    .footer-brand p{font-size:.8rem;color:var(--muted);line-height:1.8;max-width:260px;}
    .footer-col h4{font-family:'Syncopate',sans-serif;font-size:.6rem;letter-spacing:.3em;color:var(--gold);margin-bottom:1.5rem;}
    .footer-col ul{list-style:none;}
    .footer-col ul li{margin-bottom:.8rem;}
    .footer-col ul a{font-size:.82rem;color:var(--muted);text-decoration:none;transition:color .3s;}
    .footer-col ul a:hover{color:var(--white);}
    .footer-bottom{padding-top:2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .footer-bottom p{font-size:.72rem;color:var(--muted);}
    /* CART SIDEBAR */
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:800;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
    .cart-overlay.open{opacity:1;pointer-events:all;}
    .cart-sidebar{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--surface);z-index:900;transform:translateX(100%);transition:transform .4s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;border-left:1px solid var(--border-strong);}
    .cart-sidebar.open{transform:translateX(0);}
    .cart-header{padding:1.8rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .cart-title{font-family:'Syncopate',sans-serif;fo
